<!DOCTYPE html>

<title>BOPET MD根因诊断 - 封面</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 960pt; height: 540pt; margin: 0; padding: 0; background: #212121; overflow: hidden; font-family: "Microsoft YaHei", "思源黑体", "Noto Sans SC", sans-serif }
/* Red accent bar top */
.top-accent { position: absolute; top: 0; left: 0; width: 100%; height: 6pt; background: #C62828; }

.left-band { position: absolute; top: 6pt; left: 0; width: 8pt; height: 534pt; background: #C62828; }

.red-rule { width: 56pt; height: 3pt; background: #C62828; margin-bottom: 20pt; }
/* Subtitle */
.subtitle p { font-size: 13pt; color: #BDBDBD; line-height: 1.6; max-width: 520pt; }
/* Meta line */
.meta-line { position: absolute; bottom: 0; left: 0; }
.meta-line p { font-size: 10pt; color: #757575; letter-spacing: 1pt; }
/* Bottom bar */
.bottom-bar { position: absolute; bottom: 0; left: 0; width: 100%; height: 28pt; background: #000000; display: flex; align-items: center; justify-content: flex-end; padding: 0 24pt; }
.bottom-bar .page-num { font-family: "Helvetica Neue", Arial, sans-serif; font-size: 11pt; color: #C62828; font-weight: bold; }
.bottom-bar .page-num p { color: #C62828; font-weight: bold; }
</style>
</head>

<div class="top-accent"></div>
